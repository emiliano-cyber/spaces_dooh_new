# Spaces DOOH — Nginx configuration
# Replace {TENANT_SLUG} with the real tenant slug before deploying.
# Example: sed -i 's/{TENANT_SLUG}/westmedia/g' /etc/nginx/sites-available/spaces.conf

upstream spaces_api {
  server 127.0.0.1:3001;
  keepalive 64;
}

upstream spaces_web {
  server 127.0.0.1:3000;
  keepalive 64;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
  listen 80;
  server_name *.{TENANT_SLUG}.spaces.com;
  return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl;
  server_name *.{TENANT_SLUG}.spaces.com;

  ssl_certificate     /etc/letsencrypt/live/{TENANT_SLUG}.spaces.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/{TENANT_SLUG}.spaces.com/privkey.pem;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Pass full host to backend so tenant plugin can extract the slug
  proxy_set_header Host              $host;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── API (/api/* → strip prefix → port 3001) ──────────────────────────────
  location /api/ {
    proxy_pass         http://spaces_api/;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # Allow large creative uploads (max 600MB)
    client_max_body_size 600M;

    # Long timeouts for big file uploads
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;
  }

  # ── Health check (no auth, direct to API) ────────────────────────────────
  location /health {
    proxy_pass         http://spaces_api/health;
    proxy_http_version 1.1;
    access_log         off;
  }

  # ── Frontend (/ → port 3000) ──────────────────────────────────────────────
  location / {
    proxy_pass         http://spaces_web;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;

    # Next.js static assets — aggressive caching
    location /_next/static/ {
      proxy_pass        http://spaces_web;
      proxy_cache_valid 200 1y;
      add_header        Cache-Control "public, max-age=31536000, immutable";
    }
  }

  # ── Security headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options        SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy        strict-origin-when-cross-origin;
}
