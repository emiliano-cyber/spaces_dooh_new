# Spaces DOOH — Apache 2.4 configuration
# Replace {TENANT_SLUG} with the real tenant slug before deploying.
# Example: sed -i 's/{TENANT_SLUG}/h3dm/g' /etc/apache2/sites-available/spaces.conf
#
# Required modules:
#   a2enmod proxy proxy_http proxy_wstunnel rewrite headers

# ── Virtual Host HTTP (port 80) ───────────────────────────────────────────────
<VirtualHost *:80>
    ServerName {TENANT_SLUG}.localhost
    ServerAlias *.{TENANT_SLUG}.localhost

    # ── Proxy headers ────────────────────────────────────────────────────────
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port  "80"

    # ── API (/api/* → strip prefix → port 3001) ──────────────────────────────
    ProxyPass        /api/  http://127.0.0.1:3001/
    ProxyPassReverse /api/  http://127.0.0.1:3001/

    # ── Health check (no auth, direct to API) ────────────────────────────────
    ProxyPass        /health  http://127.0.0.1:3001/health
    ProxyPassReverse /health  http://127.0.0.1:3001/health

    # ── WebSockets para Next.js HMR ──────────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    # ── Frontend (/ → port 3000) ──────────────────────────────────────────────
    ProxyPass        /  http://127.0.0.1:3000/
    ProxyPassReverse /  http://127.0.0.1:3000/

    # ── Next.js static assets — aggressive caching ───────────────────────────
    <LocationMatch "^/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # ── Large file uploads (creatives hasta 600MB) ───────────────────────────
    <Location /api/>
        LimitRequestBody 629145600
    </Location>

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy        "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/spaces-error.log
    CustomLog ${APACHE_LOG_DIR}/spaces-access.log combined
</VirtualHost>
