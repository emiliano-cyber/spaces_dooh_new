name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo run typecheck --filter=web

      - name: Build
        run: npx turbo run build --filter=web

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /var/www/Marketplace/spaces-dooh

            echo "→ Pulling latest changes..."
            git pull origin main

            echo "→ Installing dependencies..."
            npm ci --prefer-offline

            echo "→ Building (solo el app web; api es huérfano)..."
            npx turbo run build --filter=web

            echo "→ Running Prisma migrations (apps/api)..."
            cd apps/api && npx prisma migrate deploy && cd ../..

            echo "→ Applying BFF SQL migrations (aditivas, idempotentes, fail-closed)..."
            node scripts/apply-migration.mjs db/migrations/20260706_reserva_ttl.sql
            node scripts/apply-migration.mjs db/migrations/20260706_propuesta_aceptacion.sql
            node scripts/apply-migration.mjs db/migrations/20260706_cobranza_recordatorios.sql
            node scripts/apply-migration.mjs db/migrations/20260706_propuesta_descuento_version.sql

            echo "→ Reloading PM2..."
            pm2 reload ecosystem.config.js --update-env

            echo "✓ Deploy completado"
            pm2 list
