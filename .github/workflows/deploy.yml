name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo run typecheck --filter=web

      - name: Build
        run: npx turbo run build --filter=web

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /var/www/Marketplace/spaces-dooh

            echo "→ Pulling latest changes..."
            git pull origin main

            echo "→ Installing dependencies..."
            npm ci --prefer-offline

            echo "→ Building (solo el app web; el Fastify se archivó en _archive/api)..."
            npx turbo run build --filter=web

            echo "→ Applying ALL BFF SQL migrations in order (aditivas, idempotentes)..."
            # Aplica TODAS las migraciones del directorio en orden lexicográfico
            # (por eso el prefijo de fecha AAAAMMDD). Antes esto era una lista fija
            # de 4 y las nuevas nunca se aplicaban (p. ej. la tabla del almacén),
            # dejando prod inconsistente (hallazgo A-5).
            for f in $(ls db/migrations/*.sql | sort); do
              echo "  → $f"
              node scripts/apply-migration.mjs "$f"
            done

            echo "→ Reloading PM2..."
            pm2 reload ecosystem.config.js --update-env

            echo "✓ Deploy completado"
            pm2 list
